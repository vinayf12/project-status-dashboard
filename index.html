<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>Project Status Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #1c1f26;
    --text-muted: #667085;
    --glass: rgba(255, 255, 255, 0.5);
    --glass-strong: rgba(255, 255, 255, 0.68);
    --glass-border: rgba(255, 255, 255, 0.65);
    --not-started: #94a3b8;
    --in-progress: #6366f1;
    --waiting: #f59e0b;
    --stale: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    min-height: 100%;
  }
  body {
    margin: 0;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #d6ecff 0%, #e3f3ea 45%, #f2f7ec 100%);
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: -15%;
    background:
      radial-gradient(38% 28% at 18% 12%, rgba(255, 255, 255, 0.75), transparent 60%),
      radial-gradient(36% 34% at 88% 8%, rgba(147, 197, 253, 0.55), transparent 60%),
      radial-gradient(46% 42% at 78% 88%, rgba(167, 243, 208, 0.55), transparent 60%),
      radial-gradient(34% 32% at 6% 82%, rgba(216, 180, 254, 0.45), transparent 60%),
      radial-gradient(30% 26% at 50% 45%, rgba(253, 224, 171, 0.35), transparent 60%);
    filter: blur(50px);
    z-index: -2;
    pointer-events: none;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(100, 116, 139, 0.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 116, 139, 0.14) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(circle at 50% 30%, rgba(0, 0, 0, 0.9), transparent 85%);
    -webkit-mask-image: radial-gradient(circle at 50% 30%, rgba(0, 0, 0, 0.9), transparent 85%);
    z-index: -1;
    pointer-events: none;
  }

  .page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
    padding: 18px 26px;
    background: var(--glass);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    box-shadow: 0 10px 34px rgba(31, 41, 55, 0.07);
  }
  .brand h1 {
    margin: 0 0 2px;
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-style: italic;
    font-size: 26px;
    letter-spacing: -0.01em;
  }
  .brand p {
    margin: 0;
    color: var(--text-muted);
    font-size: 12.5px;
  }
  #updated {
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.7);
    padding: 6px 12px;
    border-radius: 999px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    font: inherit;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.8);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(31, 41, 55, 0.05);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(31, 41, 55, 0.1);
  }
  .btn:disabled {
    opacity: 0.6;
    cursor: default;
    transform: none;
  }
  .btn.active {
    background: rgba(99, 102, 241, 0.15);
    border-color: rgba(99, 102, 241, 0.4);
  }

  .board {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: flex-start;
    padding-top: 22px;
    padding-bottom: 12px;
  }
  .column {
    width: 280px;
    flex: 0 0 280px;
    margin-bottom: 12px;
  }
  .column-header {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 6px 13px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(10px);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .count {
    color: var(--text-muted);
    font-weight: 500;
  }

  .card {
    background: var(--glass-strong);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 34px rgba(31, 41, 55, 0.12);
  }
  .card-title-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .card-title {
    font-size: 13.5px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .slack-link {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow: 0 2px 8px rgba(31, 41, 55, 0.06);
    opacity: 0.85;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .slack-link:hover {
    opacity: 1;
    transform: scale(1.08);
  }
  .slack-link svg {
    width: 13px;
    height: 13px;
  }
  .card-number {
    font-size: 11px;
    color: var(--text-muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    margin-bottom: 8px;
  }
  .card-note {
    font-size: 12px;
    color: #4b5563;
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .card-footer {
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-team {
    font-size: 10.5px;
    color: #9aa1ac;
    margin-top: 6px;
  }

  .manual-note-wrap {
    margin-top: 10px;
  }
  .manual-note {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    font-size: 11.5px;
    line-height: 1.4;
    color: #6b5a1f;
    background: rgba(253, 230, 138, 0.45);
    border: 1px solid rgba(217, 174, 33, 0.35);
    border-radius: 10px;
    padding: 8px 10px;
    white-space: pre-wrap;
  }
  .note-edit-btn {
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    color: #6366f1;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0 0;
  }
  .note-edit-btn:hover {
    text-decoration: underline;
  }
  .note-editor textarea {
    width: 100%;
    font: inherit;
    font-size: 11.5px;
    line-height: 1.4;
    border-radius: 10px;
    border: 1px solid rgba(99, 102, 241, 0.4);
    padding: 8px 10px;
    resize: vertical;
    min-height: 56px;
    background: rgba(255, 255, 255, 0.7);
  }
  .note-editor-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .note-editor-actions button {
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .note-save-btn {
    background: #6366f1;
    color: #fff;
  }
  .note-cancel-btn {
    background: rgba(0, 0, 0, 0.06);
    color: var(--text);
  }

  .empty-col {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 4px;
  }
  #error {
    margin: 20px 2px;
    padding: 16px;
    background: rgba(254, 242, 242, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid #fecaca;
    border-radius: 14px;
    color: #991b1b;
    font-size: 13px;
    display: none;
  }

  #gate {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #d6ecff 0%, #e3f3ea 45%, #f2f7ec 100%);
  }
  #gate-card {
    width: 320px;
    max-width: 88vw;
    padding: 28px 26px;
    background: var(--glass-strong);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(31, 41, 55, 0.12);
    text-align: center;
  }
  #gate-card h2 {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 20px;
    margin: 0 0 6px;
  }
  #gate-card p {
    margin: 0 0 16px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  #gate-input {
    width: 100%;
    font: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(0, 0, 0, 0.15);
    margin-bottom: 10px;
    box-sizing: border-box;
  }
  #gate-submit {
    width: 100%;
    font: inherit;
    font-size: 13.5px;
    font-weight: 600;
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: #fff;
    cursor: pointer;
  }
  #gate-error {
    margin-top: 10px;
    font-size: 12px;
    color: #b91c1c;
    display: none;
  }
  .page {
    display: none;
  }
</style>
</head>
<body>

<div id="gate">
  <div id="gate-card">
    <h2>Project Status</h2>
    <p>Enter the passphrase your team shared with you</p>
    <input id="gate-input" type="password" placeholder="Passphrase" autocomplete="off" />
    <button id="gate-submit">View Dashboard</button>
    <div id="gate-error">Incorrect passphrase.</div>
  </div>
</div>

<div class="page">
  <header>
    <div class="brand">
      <h1>Project Status</h1>
      <p>Live status of active client projects, pulled from Slack</p>
    </div>
    <div class="header-right">
      <div id="updated"></div>
      <button id="syncBtn" class="btn" title="Request a fresh Slack/Asana scan (picked up within ~20 min)">🔄 Sync</button>
      <button id="editToggleBtn" class="btn" title="Unlock note editing">✏️ Edit</button>
    </div>
  </header>

  <div id="error"></div>
  <div class="board" id="board"></div>
</div>

<script>
  // Casual speed-bump only, not real security (page source + data.json are still directly fetchable). Change this to whatever you want.
  const VIEW_PASSPHRASE = "superside-status-26";

  function unlockGate() {
    document.getElementById("gate").style.display = "none";
    document.querySelector(".page").style.display = "block";
  }

  if (localStorage.getItem("dashboardViewUnlocked") === "1") {
    unlockGate();
  } else {
    document.getElementById("gate-submit").addEventListener("click", checkGatePassphrase);
    document.getElementById("gate-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkGatePassphrase();
    });
  }

  function checkGatePassphrase() {
    const val = document.getElementById("gate-input").value;
    if (val === VIEW_PASSPHRASE) {
      localStorage.setItem("dashboardViewUnlocked", "1");
      unlockGate();
    } else {
      document.getElementById("gate-error").style.display = "block";
    }
  }

  const STATUS_ORDER = [
    "Project Not Started",
    "In Progress",
    "Waiting for Feedback",
    "Stale",
  ];

  const STATUS_COLOR = {
    "Project Not Started": "var(--not-started)",
    "In Progress": "var(--in-progress)",
    "Waiting for Feedback": "var(--waiting)",
    "Stale": "var(--stale)",
  };

  const SLACK_ICON = `<svg viewBox="0 0 122.8 122.8" xmlns="http://www.w3.org/2000/svg">
    <path d="M25.8 77.6c0 7.1-5.8 12.9-12.9 12.9S0 84.7 0 77.6s5.8-12.9 12.9-12.9h12.9v12.9z" fill="#e01e5a"/>
    <path d="M32.3 77.6c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9v32.3c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V77.6z" fill="#e01e5a"/>
    <path d="M45.2 25.8c-7.1 0-12.9-5.8-12.9-12.9S38.1 0 45.2 0s12.9 5.8 12.9 12.9v12.9H45.2z" fill="#36c5f0"/>
    <path d="M45.2 32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H12.9C5.8 58.1 0 52.3 0 45.2s5.8-12.9 12.9-12.9h32.3z" fill="#36c5f0"/>
    <path d="M97 45.2c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9-5.8 12.9-12.9 12.9H97V45.2z" fill="#2eb67d"/>
    <path d="M90.5 45.2c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V12.9C64.7 5.8 70.5 0 77.6 0s12.9 5.8 12.9 12.9v32.3z" fill="#2eb67d"/>
    <path d="M77.6 97c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9-12.9-5.8-12.9-12.9V97h12.9z" fill="#ecb22e"/>
    <path d="M77.6 90.5c-7.1 0-12.9-5.8-12.9-12.9s5.8-12.9 12.9-12.9h32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H77.6z" fill="#ecb22e"/>
  </svg>`;

  // Requests go through a small Cloudflare Worker proxy that holds the real GitHub token server-side — no secret lives in this page.
  const WORKER_URL = "https://project-status-dashboard-worker.vinaypittampally.workers.dev";
  const EDIT_PASSPHRASE = "vinay-dashboard-2026";

  let editUnlocked = sessionStorage.getItem("dashboardEditUnlocked") === "1";
  let editingProject = null;
  let LAST_DATA = null;

  async function requestSync() {
    const res = await fetch(`${WORKER_URL}/sync`, { method: "POST" });
    const body = await res.json();
    if (!res.ok || !body.ok) throw new Error(body.error || `Sync request failed: ${res.status}`);
  }

  async function saveManualNote(projectNumber, noteText) {
    const res = await fetch(`${WORKER_URL}/note`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ project_number: projectNumber, note: noteText }),
    });
    const body = await res.json();
    if (!res.ok || !body.ok) throw new Error(body.error || `Save failed: ${res.status}`);
    return body.data;
  }

  function updateEditToggleUI() {
    const btn = document.getElementById("editToggleBtn");
    if (editUnlocked) {
      btn.textContent = "🔓 Edit: On";
      btn.classList.add("active");
    } else {
      btn.textContent = "✏️ Edit";
      btn.classList.remove("active");
    }
  }

  document.getElementById("editToggleBtn").addEventListener("click", () => {
    if (editUnlocked) {
      editUnlocked = false;
      sessionStorage.removeItem("dashboardEditUnlocked");
      editingProject = null;
      updateEditToggleUI();
      render(LAST_DATA);
      return;
    }
    const pass = prompt("Enter edit passphrase:");
    if (pass === null) return;
    if (pass === EDIT_PASSPHRASE) {
      editUnlocked = true;
      sessionStorage.setItem("dashboardEditUnlocked", "1");
      updateEditToggleUI();
      render(LAST_DATA);
    } else {
      alert("Incorrect passphrase.");
    }
  });

  document.getElementById("syncBtn").addEventListener("click", async () => {
    const btn = document.getElementById("syncBtn");
    btn.disabled = true;
    btn.textContent = "Requesting…";
    try {
      await requestSync();
      btn.textContent = "✓ Requested";
      setTimeout(() => {
        btn.textContent = "🔄 Sync";
        btn.disabled = false;
      }, 5000);
    } catch (err) {
      alert("Sync request failed: " + err.message);
      btn.textContent = "🔄 Sync";
      btn.disabled = false;
    }
  });

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T00:00:00Z");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  function fmtUpdatedAt(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return "Last updated " + d.toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }

  function render(data) {
    document.getElementById("updated").textContent = fmtUpdatedAt(data.updated_at);

    const projects = data.projects || [];
    const byStatus = {};
    STATUS_ORDER.forEach((s) => (byStatus[s] = []));
    projects.forEach((p) => {
      const s = STATUS_ORDER.includes(p.status) ? p.status : "Project Not Started";
      byStatus[s].push(p);
    });

    // board
    const board = document.getElementById("board");
    board.innerHTML = "";
    STATUS_ORDER.forEach((status) => {
      const items = byStatus[status].slice().sort((a, b) =>
        (b.last_activity || "").localeCompare(a.last_activity || "")
      );

      const col = document.createElement("div");
      col.className = "column";

      const header = document.createElement("div");
      header.className = "column-header";
      header.innerHTML = `<span class="dot" style="background:${STATUS_COLOR[status]}"></span>${status} <span class="count">(${items.length})</span>`;
      col.appendChild(header);

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty-col";
        empty.textContent = "Nothing here";
        col.appendChild(empty);
      }

      items.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";
        const slackUrl = p.channel_id
          ? `https://slack.com/app_redirect?channel=${encodeURIComponent(p.channel_id)}`
          : null;
        const team = Array.isArray(p.team) ? p.team.filter(Boolean) : [];
        const pn = p.project_number;
        const manualNote = p.manual_note || "";
        let noteSection;
        if (editingProject === pn) {
          noteSection = `
            <div class="note-editor" data-project="${pn}">
              <textarea id="note-textarea-${pn}" placeholder="Add a private-ish note...">${escapeHtml(manualNote)}</textarea>
              <div class="note-editor-actions">
                <button class="note-save-btn" data-project="${pn}">Save</button>
                <button class="note-cancel-btn" data-project="${pn}">Cancel</button>
              </div>
            </div>`;
        } else {
          noteSection = `
            <div class="manual-note-wrap">
              ${manualNote ? `<div class="manual-note">📌 ${escapeHtml(manualNote)}</div>` : ""}
              ${editUnlocked ? `<button class="note-edit-btn" data-project="${pn}">${manualNote ? "Edit note" : "+ Add note"}</button>` : ""}
            </div>`;
        }
        card.innerHTML = `
          <div class="card-title-row">
            <div class="card-title">${escapeHtml(p.display_name || p.channel_name || "Untitled project")}</div>
            ${slackUrl ? `<a class="slack-link" href="${slackUrl}" target="_blank" rel="noopener" title="Open #${escapeHtml(p.channel_name || "")} in Slack">${SLACK_ICON}</a>` : ""}
          </div>
          <div class="card-number">#${escapeHtml(p.project_number || "—")}</div>
          <div class="card-note">${escapeHtml(p.note || "")}</div>
          <div class="card-footer">Last activity: ${fmtDate(p.last_activity)}</div>
          ${team.length ? `<div class="card-team">${escapeHtml(team.join(", "))}</div>` : ""}
          ${noteSection}
        `;
        col.appendChild(card);
      });

      board.appendChild(col);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById("board").addEventListener("click", async (e) => {
    const editBtn = e.target.closest(".note-edit-btn");
    if (editBtn) {
      editingProject = editBtn.dataset.project;
      render(LAST_DATA);
      return;
    }
    const cancelBtn = e.target.closest(".note-cancel-btn");
    if (cancelBtn) {
      editingProject = null;
      render(LAST_DATA);
      return;
    }
    const saveBtn = e.target.closest(".note-save-btn");
    if (saveBtn) {
      const pn = saveBtn.dataset.project;
      const textarea = document.getElementById(`note-textarea-${pn}`);
      const value = textarea ? textarea.value : "";
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving…";
      try {
        const updatedData = await saveManualNote(pn, value);
        LAST_DATA = updatedData;
        editingProject = null;
        render(LAST_DATA);
      } catch (err) {
        alert("Couldn't save note: " + err.message);
        saveBtn.disabled = false;
        saveBtn.textContent = "Save";
      }
      return;
    }
  });

  updateEditToggleUI();

  fetch("data.json", { cache: "no-store" })
    .then((r) => r.json())
    .then(render)
    .catch((err) => {
      const el = document.getElementById("error");
      el.style.display = "block";
      el.textContent = "Couldn't load project data: " + err.message;
    });
</script>
