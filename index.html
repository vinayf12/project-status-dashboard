<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Status Dashboard</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --border: #e2e4e9;
    --text: #1c1f26;
    --text-muted: #6b7280;
    --todo: #94a3b8;
    --progress: #3b82f6;
    --sent: #8b5cf6;
    --waiting: #f59e0b;
    --blocked: #ef4444;
    --done: #22c55e;
    --unclear: #9ca3af;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 28px 32px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
  }
  header p {
    margin: 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  #updated {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }
  .summary {
    display: flex;
    gap: 8px;
    padding: 0 32px 20px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
    white-space: nowrap;
  }
  .board {
    display: flex;
    gap: 16px;
    padding: 0 32px 32px;
    overflow-x: auto;
    align-items: flex-start;
  }
  .column {
    background: transparent;
    min-width: 260px;
    max-width: 280px;
    flex: 1 0 260px;
  }
  .column-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .count {
    color: var(--text-muted);
    font-weight: 500;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
  }
  .card-title {
    font-size: 13.5px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-number {
    font-size: 11px;
    color: var(--text-muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    margin-bottom: 6px;
  }
  .card-note {
    font-size: 12px;
    color: #4b5563;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .card-footer {
    font-size: 11px;
    color: var(--text-muted);
  }
  .empty-col {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 2px;
  }
  #error {
    margin: 32px;
    padding: 16px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    color: #991b1b;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Project Status Dashboard</h1>
    <p>Live status of active client projects, pulled from Slack</p>
  </div>
  <div id="updated"></div>
</header>

<div class="summary" id="summary"></div>
<div id="error"></div>
<div class="board" id="board"></div>

<script>
  const STATUS_ORDER = [
    "To Do",
    "In Progress",
    "Sent to Client",
    "Waiting for Feedback",
    "Blocked",
    "Done",
    "Unclear",
  ];

  const STATUS_COLOR = {
    "To Do": "var(--todo)",
    "In Progress": "var(--progress)",
    "Sent to Client": "var(--sent)",
    "Waiting for Feedback": "var(--waiting)",
    "Blocked": "var(--blocked)",
    "Done": "var(--done)",
    "Unclear": "var(--unclear)",
  };

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T00:00:00Z");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  function fmtUpdatedAt(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return "Last updated " + d.toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }

  function render(data) {
    document.getElementById("updated").textContent = fmtUpdatedAt(data.updated_at);

    const projects = data.projects || [];
    const byStatus = {};
    STATUS_ORDER.forEach((s) => (byStatus[s] = []));
    projects.forEach((p) => {
      const s = STATUS_ORDER.includes(p.status) ? p.status : "Unclear";
      byStatus[s].push(p);
    });

    // summary chips
    const summary = document.getElementById("summary");
    summary.innerHTML = "";
    STATUS_ORDER.forEach((s) => {
      const n = byStatus[s].length;
      if (!n) return;
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.style.background = STATUS_COLOR[s];
      chip.textContent = `${s}: ${n}`;
      summary.appendChild(chip);
    });

    // board
    const board = document.getElementById("board");
    board.innerHTML = "";
    STATUS_ORDER.forEach((status) => {
      const items = byStatus[status].slice().sort((a, b) =>
        (b.last_activity || "").localeCompare(a.last_activity || "")
      );

      const col = document.createElement("div");
      col.className = "column";

      const header = document.createElement("div");
      header.className = "column-header";
      header.innerHTML = `<span class="dot" style="background:${STATUS_COLOR[status]}"></span>${status} <span class="count">(${items.length})</span>`;
      col.appendChild(header);

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty-col";
        empty.textContent = "Nothing here";
        col.appendChild(empty);
      }

      items.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-title">${escapeHtml(p.display_name || p.channel_name || "Untitled project")}</div>
          <div class="card-number">#${escapeHtml(p.project_number || "—")}</div>
          <div class="card-note">${escapeHtml(p.note || "")}</div>
          <div class="card-footer">Last activity: ${fmtDate(p.last_activity)}</div>
        `;
        col.appendChild(card);
      });

      board.appendChild(col);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  fetch("data.json", { cache: "no-store" })
    .then((r) => r.json())
    .then(render)
    .catch((err) => {
      const el = document.getElementById("error");
      el.style.display = "block";
      el.textContent = "Couldn't load project data: " + err.message;
    });
</script>

</body>
</html>
