  } else {

    document.getElementById("gate-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkGatePassphrase();
    });
  }

  function checkGatePassphrase() {
    const val = document.getElementById("gate-input").value;
    if (val === VIEW_PASSPHRASE) {
      safeStorageSet("dashboardViewUnlocked", "1");
      unlockGate();
    } else {
      document.getElementById("gate-error").style.display = "block";
    }
  }

  const STATUS_ORDER = [
    "Project Not Started",
    "In Progress",
    "Waiting for Feedback",
    "Stale",
  ];

  const STATUS_COLOR = {
    "Project Not Started": "var(--not-started)",
    "In Progress": "var(--in-progress)",
    "Waiting for Feedback": "var(--waiting)",
    "Stale": "var(--stale)",
  };

  const SLACK_ICON = `<svg viewBox="0 0 122.8 122.8" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M25.8 77.6c0 7.1-5.8 12.9-12.9 12.9S0 84.7 0 77.6s5.8-12.9 12.9-12.9h12.9v12.9z" fill="#e01e5a"/>
    <path d="M32.3 77.6c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9v32.3c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V77.6z" fill="#e01e5a"/>
    <path d="M45.2 25.8c-7.1 0-12.9-5.8-12.9-12.9S38.1 0 45.2 0s12.9 5.8 12.9 12.9v12.9H45.2z" fill="#36c5f0"/>
    <path d="M45.2 32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H12.9C5.8 58.1 0 52.3 0 45.2s5.8-12.9 12.9-12.9h32.3z" fill="#36c5f0"/>
    <path d="M97 45.2c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9-5.8 12.9-12.9 12.9H97V45.2z" fill="#2eb67d"/>
    <path d="M90.5 45.2c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V12.9C64.7 5.8 70.5 0 77.6 0s12.9 5.8 12.9 12.9v32.3z" fill="#2eb67d"/>
    <path d="M77.6 97c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9-12.9-5.8-12.9-12.9V97h12.9z" fill="#ecb22e"/>
    <path d="M77.6 90.5c-7.1 0-12.9-5.8-12.9-12.9s5.8-12.9 12.9-12.9h32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H77.6z" fill="#ecb22e"/>
  </svg>`;

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T00:00:00Z");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  function fmtUpdatedAt(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return "Last updated " + d.toLocaleString(undefined, {
      month: "short", day: "numeric", hour: "numeric", minute: "2-digit"
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : str;
    return div.innerHTML;
  }

  function render(data) {
    document.getElementById("updated").textContent = fmtUpdatedAt(data.updated_at);

    const projects = data.projects || [];
    const byStatus = {};
    STATUS_ORDER.forEach((s) => (byStatus[s] = []));
    projects.forEach((p) => {
      const s = STATUS_ORDER.includes(p.status) ? p.status : "Project Not Started";
      byStatus[s].push(p);
    });

    const board = document.getElementById("board");
    board.innerHTML = "";
    STATUS_ORDER.forEach((status) => {
      const items = byStatus[status].slice().sort((a, b) =>
        (b.last_activity || "").localeCompare(a.last_activity || "")
      );

      const col = document.createElement("div");
      col.className = "column";

      const header = document.createElement("div");
      header.className = "column-header";
      header.innerHTML = `<span class="dot" style="background:${STATUS_COLOR[status]}"></span>${status} <span class="count">(${items.length})</span>`;
      col.appendChild(header);

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty-col";
        empty.textContent = "Nothing here";
        col.appendChild(empty);
      }

      items.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";
        const slackUrl = p.channel_id
          ? `https://slack.com/app_redirect?channel=${encodeURIComponent(p.channel_id)}`
          : null;
        const team = Array.isArray(p.team) ? p.team.filter(Boolean) : [];
        const noteSummary = typeof p.note === "string" ? p.note : (p.note && p.note.summary) || "";
        const details = Array.isArray(p.details) ? p.details.filter(Boolean) : [];
        const detailsHtml = details.length
          ? `<ul class="card-details">${details.map((d) => `<li>${escapeHtml(d)}</li>`).join("")}</ul>`
          : "";
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title-row">
              <div class="card-title">${escapeHtml(p.display_name || p.channel_name || "Untitled project")}</div>
              ${slackUrl ? `<a class="slack-link" href="${slackUrl}" target="_blank" rel="noopener" title="Open #${escapeHtml(p.channel_name || "")} in Slack">${SLACK_ICON}</a>` : ""}
            </div>
            <div class="card-number">#${escapeHtml(p.project_number || "—")}</div>
          </div>
          <div class="card-body">
            <div class="card-note">${escapeHtml(noteSummary)}</div>
            ${detailsHtml}
            <div class="card-footer">Last activity: ${fmtDate(p.last_activity)}</div>
            ${team.length ? `<div class="card-team">${escapeHtml(team.join(", "))}</div>` : ""}
          </div>
        `;
        col.appendChild(card);
      });

      board.appendChild(col);
    });
  }

  render(DATA);
</script>
